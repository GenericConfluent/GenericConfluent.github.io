# The URL the site will be built for
base_url = "https://generic-confluent.ca/"

title = "Generic Confluent"
description = "I am a happy hippopotamus."

theme = "serene"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = false


[markdown]
external_links_target_blank = false
external_links_no_follow = true
external_links_no_referrer = true

[markdown.highlighting]
style = "class"
light_theme = "github-light"
dark_theme = "github-dark"

# [markdown.math]
# engine = "typst"
# svgo = false

[extra]
favicon = "favicon.ico"

sections = [
    { name = "/blog/", path = "/blog", is_external = false },
    { name = "/notes/", path = "/notes", is_external = false },
]
blog_section_path = "/blog"

back_link_text = "Back"
force_theme = false

footer_copyright = "© 2025 Generic Confluent"
footer_credits = true

not_found_error_text = "404 Not Found"
not_found_recover_text = "« back to home »"

reaction = false
reaction_align = "right"
reaction_endpoint = ""
